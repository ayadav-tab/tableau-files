<!DOCTYPE html>
<html>
<head>
   <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script src="tableau.extensions.1.latest.js"></script>
   <script src="script.js"></script>
    <style>
      @font-face {
    font-family: 'Noto Sans';
    src: url('./fonts/NotoSans-Regular.ttf') format('truetype');
    font-weight: 300;
    font-style: normal;
}
    body {
     
      padding: 10px;
    }

    table {
      border-collapse: collapse;
      min-width: 100%;
      width: max-content;
       font-family: 'Noto Sans';
       font-size: 13px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    .link {
      color: blue;
      cursor: pointer;
      text-decoration: underline;
    }
    .table-container{
    height:90vh;
    overflow:auto;
    overflow-x: auto;
}
tr{
  color: #0a1157;
}


th, td { 
    border:1px solid #ddd; 
    padding:6px; 
}

th { 
    cursor:pointer; 
    background:#0a1157;
    position: sticky;
    top: 0;
    z-index: 2;
    color: white;
    font-weight: 400;
    
}

tr:hover { 
    background:#f1f1f1; 
}
.sort-icon {
    font-size: 10px;
    margin-left: 6px;
    opacity: 0.6;
}

th:hover .sort-icon {
    opacity: 1;
}

</style>
  </style>
</head>
<body>
  <button id="configure">Configure</button>
    <div class="table-container">
    <table id="dataTable">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>
</body>
</html>
