<!DOCTYPE html>
<html>
<head>
  <script src="https://raw.githubusercontent.com/ayadav-tab/tableau-files/refs/heads/main/tableau.extensions.1.latest.js"></script>
</head>

<body>
<h3>Custom Extension</h3>

<script>
(function () {
  $(document).ready(function () {
    tableau.extensions.initializeAsync().then(function () {
     console.log('Started...');
    }, function (err) {
      // Something went wrong in initialization.
      console.log('Error while Initializing: ' + err.toString());
    });
  });
})();
</script>

</body>
</html>
