<!DOCTYPE html>
<html>
<head>
   <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script src="tableau.extensions.1.latest.js"></script>
   <script src="script.js"></script>
    <style>
    body {
      font-family: Segoe UI;
      padding: 10px;
    }

    table {
      border-collapse: collapse;
      min-width: 100%;
      width: max-content;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    .link {
      color: blue;
      cursor: pointer;
      text-decoration: underline;
    }
    .table-container{
    height:90vh;
    overflow:auto;
    overflow-x: auto;
}



th, td { 
    border:1px solid #ddd; 
    padding:6px; 
}

th { 
    cursor:pointer; 
    background:#f4f4f4;
    position: sticky;
    top: 0;
    z-index: 2;
}

tr:hover { 
    background:#f1f1f1; 
}
</style>
  </style>
</head>
<body>
    <div class="table-container">
    <table id="dataTable">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>
</body>
</html>
